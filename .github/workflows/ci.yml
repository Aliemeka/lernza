name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # ── Detect what changed ──────────────────────────────────────────
  # Used by build jobs to skip when irrelevant files changed.
  # Fast (<5s) and always runs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            contracts:
              - 'contracts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ── PR title must follow Conventional Commits ────────────────────
  # Re-runs on edit so contributors can fix titles without new commits.
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert

  # ── PR must link to an issue ─────────────────────────────────────
  # Re-runs on edit so contributors can add "Closes #N" after opening.
  # Skip for dependabot or PRs labeled "no-issue".
  linked-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Check for linked issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          PR_DATA=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
            --json author,labels,body)

          AUTHOR=$(echo "$PR_DATA" | jq -r '.author.login')
          HAS_NO_ISSUE=$(echo "$PR_DATA" | jq -r '.labels | map(.name) | any(. == "no-issue")')

          if [ "$AUTHOR" = "dependabot[bot]" ] || [ "$AUTHOR" = "dependabot" ]; then
            echo "Dependabot PR, skipping"
            exit 0
          fi

          if [ "$HAS_NO_ISSUE" = "true" ]; then
            echo "PR has no-issue label, skipping"
            exit 0
          fi

          # Check via GitHub's closingIssuesReferences API (catches sidebar links)
          OWNER="${{ github.repository_owner }}"
          NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)

          LINKED=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  closingIssuesReferences(first: 5) {
                    nodes { number }
                  }
                }
              }
            }" -q '.data.repository.pullRequest.closingIssuesReferences.nodes | length' 2>/dev/null || echo "0")

          if [ "$LINKED" -gt 0 ]; then
            echo "PR links to $LINKED issue(s) via GitHub"
            exit 0
          fi

          # Fallback: check body for closing keywords
          BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
          if echo "$BODY" | grep -qiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+'; then
            echo "PR body contains closing keyword"
            exit 0
          fi

          echo "::error::PR must link to an issue. Use 'Closes #N' in the PR description, or link via the Development sidebar. Add the 'no-issue' label to skip this check for trivial changes."
          exit 1

  # ── PR must have at least one label ──────────────────────────────
  # Re-runs on label add/remove so the check updates immediately.
  label-check:
    runs-on: ubuntu-latest
    steps:
      - uses: mheap/github-action-required-labels@v5
        with:
          mode: minimum
          count: 1
          labels: "bug, enhancement, documentation, refactor, tests, infrastructure, security, good first issue, help wanted, contracts, frontend, design, no-issue, dependencies"

  # ── Frontend: lint + type-check + build ──────────────────────────
  # Only runs when frontend/ files change.
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check & build
        run: pnpm run build

  # ── Contracts: fmt + clippy + test + build WASM ──────────────────
  # Only runs when contracts/ or Cargo files change.
  contracts:
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stellar-cli
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/releases/download/v25.2.0/stellar-cli-25.2.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown,wasm32v1-none
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace

      - name: Build WASM contracts
        run: stellar contract build

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: contracts-wasm
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 14
